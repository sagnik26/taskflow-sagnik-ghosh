# For local development: full deps + tsx watch (see entrypoint DEV_WATCH=1).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      DEV_WATCH: "1"
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - dist/
            - package.json
            - package-lock.json
            - Dockerfile
            - Dockerfile.dev
            - .dockerignore
            - .env
            - .git/
            - docs/
            - "*.md"
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/package-lock.json
        - action: rebuild
          path: ./backend/Dockerfile
        - action: rebuild
          path: ./backend/Dockerfile.dev

  # pgadmin:
  #   environment:
  #     PGADMIN_CONFIG_WTF_CSRF_ENABLED: "False"
  #     PGADMIN_CONFIG_WTF_CSRF_CHECK_DEFAULT: "False"
